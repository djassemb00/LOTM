name: Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build on Linux (PC)
  build-linux:
    name: Build Linux (PC)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build all crates
        run: cargo build --verbose

      - name: Build release
        run: cargo build --release --verbose

  # Build on Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build all crates
        run: cargo build --verbose

      - name: Build release
        run: cargo build --release --verbose

  # Build on macOS
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build all crates
        run: cargo build --verbose

      - name: Build release
        run: cargo build --release --verbose

  # Build for Android
  build-android:
    name: Build Android (aarch64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android target
        run: rustup target add aarch64-linux-android

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up Android linker
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-linux-android]' > .cargo/config.toml
          echo "linker = \"${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang\"" >> .cargo/config.toml

      - name: Build for Android
        run: cargo build --target aarch64-linux-android --verbose

      - name: Build Android release
        run: cargo build --target aarch64-linux-android --release

  # Documentation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate documentation
        run: cargo doc --no-deps --workspace || echo "Documentation generation had warnings"

      - name: Upload documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: target/doc/
          retention-days: 30
